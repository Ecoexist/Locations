<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Live GPS Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .popup-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>
  // -----------------------------
  // CONFIG
  // -----------------------------

  const SHEET_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqf7zyiA1RZbMCwnhTcWOCLfAJmBq7b8s7MnJcubRxX2oQJ4kbSiVWN-vIhiXjTZKd6LQyq4pPSvrk/pub?output=csv";

  const REFRESH_INTERVAL = 30000; // 30 seconds

  // -----------------------------
  // CREATE MAP
  // -----------------------------

  const map = L.map('map').setView([-24.65, 25.91], 7);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution: '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  let markersLayer = L.layerGroup().addTo(map);

  // -----------------------------
  // LOAD CSV DATA
  // -----------------------------

  async function loadData() {

    try {

      const response = await fetch(SHEET_URL);
      const csvText = await response.text();

      const rows = csvText.split('\n').slice(1);

      markersLayer.clearLayers();

      rows.forEach(row => {

        const cols = row.split(',');

        const location = cols[0]?.trim();
        const lat = parseFloat(cols[1]);
        const lon = parseFloat(cols[2]);
        const source = cols[3]?.trim();

        if (!isNaN(lat) && !isNaN(lon)) {

          const marker = L.marker([lat, lon]);

          marker.bindPopup(`
            <div class="popup-title">${location}</div>
            <div><b>Source:</b> ${source}</div>
            <div><b>Lat:</b> ${lat}</div>
            <div><b>Lon:</b> ${lon}</div>
          `);

          marker.addTo(markersLayer);
        }

      });

    } catch (err) {
      console.error("Error loading sheet:", err);
    }
  }

  // -----------------------------
  // INITIAL LOAD
  // -----------------------------

  loadData();

  // -----------------------------
  // AUTO REFRESH
  // -----------------------------

  setInterval(loadData, REFRESH_INTERVAL);

</script>

</body>
</html>
